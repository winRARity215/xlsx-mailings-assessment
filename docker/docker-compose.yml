services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8001:8000"
    environment:
      POSTGRES_DB: xlsx_mailings
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ../:/app
    command: ["python", "src/manage.py", "run_in_docker", "python", "src/manage.py", "runserver", "0.0.0.0:8000"]

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      POSTGRES_DB: xlsx_mailings
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ../:/app
    command: ["python", "src/manage.py", "run_in_docker", "celery", "-A", "config", "worker", "-l", "INFO"]

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: xlsx_mailings
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5433:5432"
    volumes:
      - xlsx_mailings_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  xlsx_mailings_pgdata:
